              - generic [ref=e75]: About this skill
              - generic [ref=e76]: "Help developers optimize website and web application performance to improve user experience, SEO rankings, and conversion rates. This skill provides systematic approaches to measure, analyze, and improve loading speed, runtime performance, and Core Web Vitals metrics. I'll help you establish baseline metrics: Analyze performance problems: Focus on high-impact improvements: Apply performance improvements: Measure impact of changes: Symptoms: Good Lighthouse score on desktop, poor on mobile Solution: Symptoms: Long Time to Interactive (TTI), high FID Solution: Symptoms: High CLS score, content jumping Solution: Symptoms: High TTFB (Time to First Byte) Solution: Pro Tip: Focus on Core Web Vitals (LCP, FID, CLS) first - they have the biggest impact on user experience and SEO rankings! - Use when website or app is loading slowly - Use when optimizing for Core Web Vitals (LCP, FID, CLS) - Use when reducing JavaScript bundle size - Use when improving Time to Interactive (TTI) - Use when optimizing images and assets - Use when implementing caching strategies - Use when debugging performance bottlenecks - Use when preparing for performance audits - Run Lighthouse audits - Measure Core Web Vitals (LCP, FID, CLS) - Check bundle sizes - Analyze network waterfall - Identify performance bottlenecks - Large JavaScript bundles - Unoptimized images - Render-blocking resources - Slow server response times - Missing caching headers - Layout shifts - Long tasks blocking main thread - Critical rendering path optimization - Code splitting and lazy loading - Image optimization - Caching strategies - Third-party script optimization - Optimize assets (images, fonts, CSS, JS) - Implement code splitting - Add caching headers - Lazy load non-critical resources - Optimize critical rendering path - Re-run Lighthouse audits - Compare before/after metrics - Monitor real user metrics (RUM) - Test on different devices and networks - Measure First - Always establish baseline metrics before optimizing - Use Lighthouse - Run audits regularly to track progress - Optimize Images - Use modern formats (WebP, AVIF) and responsive images - Code Split - Break large bundles into smaller chunks - Lazy Load - Defer non-critical resources - Cache Aggressively - Set proper cache headers for static assets - Minimize Main Thread Work - Keep JavaScript execution under 50ms chunks - Preload Critical Resources - Use &#x3C;link rel=\"preload\"> for critical assets - Use CDN - Serve static assets from CDN for faster delivery - Monitor Real Users - Track Core Web Vitals from real users - Don't Optimize Blindly - Measure first, then optimize - Don't Ignore Mobile - Test on real mobile devices and slow networks - Don't Block Rendering - Avoid render-blocking CSS and JavaScript - Don't Load Everything Upfront - Lazy load non-critical resources - Don't Forget Dimensions - Always specify image width/height - Don't Use Synchronous Scripts - Use async or defer attributes - Don't Ignore Third-Party Scripts - They often cause performance issues - Don't Skip Compression - Always compress and minify assets - Test on real mobile devices - Use Chrome DevTools mobile throttling - Optimize for 3G/4G networks - Reduce JavaScript execution time - Analyze bundle with webpack-bundle-analyzer - Remove unused dependencies - Implement code splitting - Lazy load non-critical code - Always specify width and height - Use aspect-ratio CSS property - Reserve space with skeleton loaders - Implement server-side caching - Use CDN for static assets - Optimize database queries - Consider static site generation (SSG) - Lighthouse - Comprehensive performance audit - WebPageTest - Detailed waterfall analysis - Chrome DevTools - Performance profiling - PageSpeed Insights - Real user metrics - Web Vitals Extension - Monitor Core Web Vitals - webpack-bundle-analyzer - Visualize bundle composition - source-map-explorer - Analyze bundle size - Bundlephobia - Check package sizes before installing - ImageOptim - Image compression tool - Google Analytics - Track Core Web Vitals - Sentry - Performance monitoring - New Relic - Application performance monitoring - Datadog - Real user monitoring - @react-best-practices - React performance patterns - @frontend-dev-guidelines - Frontend development standards - @systematic-debugging - Debug performance issues - @senior-architect - Architecture for performance - Web.dev Performance - Core Web Vitals - Lighthouse Documentation - MDN Performance Guide - Next.js Performance - Image Optimization Guide"
