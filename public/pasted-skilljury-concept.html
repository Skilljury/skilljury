                </section>

                {/* Featured */}

                    <div className="flex items-center justify-between mb-8">
                        <h2 className="text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100">Featured Skills</h2>

                                    <span>â€¢</span>

                                            </div>
                                            <div className="flex text-amber-500"><IconStar/><IconStar/><IconStar/><IconStar/><IconStar/></div>

                    document.documentElement.classList.remove('dark');
                }

            const navigate = (newRoute, data = null) => {
                setRoute(newRoute);
                if (data) setSelectedSkill(data);
                window.scrollTo(0, 0);
            };

            return (

                    {/* Top Navigation */}

                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <div className="hidden md:flex relative group">
                                    <IconSearch className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400 group-focus-within:text-zinc-900 dark:group-focus-within:text-zinc-100 transition-colors" />

                                        type="text" 
                                        placeholder="Search skills..."

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

</body>
</html>
