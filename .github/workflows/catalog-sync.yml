name: Catalog sync

on:
  push:
    branches:
      - main
      - incident/restore-catalog-sync
    paths:
      - ".github/workflows/catalog-sync.yml"
      - "scripts/sync-skills-sh.ts"
      - "scripts/run-manual-sync.ts"
      - "lib/ingestion/**"
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional maximum number of skills to sync"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: https://skilljury.com
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify required configuration
        shell: bash
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "Missing NEXT_PUBLIC_SUPABASE_URL repository secret"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || { echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY repository secret"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "Missing SUPABASE_SERVICE_ROLE_KEY repository secret"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Select sync scope
        id: scope
        shell: bash
        env:
          REQUESTED_LIMIT: ${{ inputs.limit }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "args=--limit=1" >> "$GITHUB_OUTPUT"
          elif [[ -n "$REQUESTED_LIMIT" ]]; then
            [[ "$REQUESTED_LIMIT" =~ ^[1-9][0-9]*$ ]] || { echo "limit must be a positive integer"; exit 1; }
            echo "args=--limit=$REQUESTED_LIMIT" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Synchronize catalog
        run: npm run sync:skills -- ${{ steps.scope.outputs.args }}
